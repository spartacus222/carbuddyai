openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CarBuddy Direct API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat operations
  - name: vehicles
    description: Vehicle inventory operations
  - name: shortlist
    description: User shortlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: Search and list vehicles
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: maxPrice
          in: query
          required: false
          schema:
            type: integer
        - name: maxMileage
          in: query
          required: false
          schema:
            type: integer
        - name: query
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /shortlist:
    get:
      operationId: getShortlist
      tags: [shortlist]
      summary: Get shortlisted vehicles
      responses:
        "200":
          description: Shortlisted vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShortlistEntry"
    post:
      operationId: addToShortlist
      tags: [shortlist]
      summary: Add vehicle to shortlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToShortlistBody"
      responses:
        "201":
          description: Created shortlist entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortlistEntry"

  /shortlist/{vehicleId}:
    delete:
      operationId: removeFromShortlist
      tags: [shortlist]
      summary: Remove vehicle from shortlist
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        year:
          type: integer
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        mileage:
          type: integer
        price:
          type: integer
        type:
          type: string
        mpg:
          type: integer
        seats:
          type: integer
        cargoSpace:
          type: number
        dealerName:
          type: string
        dealerDistance:
          type: number
        dealerRating:
          type: number
        priceStatus:
          type: string
        marketPriceDiff:
          type: integer
        badge:
          type: string
        features:
          type: array
          items:
            type: string
        matchScore:
          type: integer
      required:
        - id
        - year
        - make
        - model
        - trim
        - mileage
        - price
        - type
        - mpg
        - seats
        - cargoSpace
        - dealerName
        - dealerDistance
        - dealerRating
        - priceStatus
        - marketPriceDiff
        - badge
        - features
        - matchScore

    ShortlistEntry:
      type: object
      properties:
        id:
          type: integer
        vehicleId:
          type: integer
        createdAt:
          type: string
          format: date-time
        vehicle:
          $ref: "#/components/schemas/Vehicle"
      required:
        - id
        - vehicleId
        - createdAt
        - vehicle

    AddToShortlistBody:
      type: object
      properties:
        vehicleId:
          type: integer
      required:
        - vehicleId

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
